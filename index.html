    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --accent-color: #1976d2; 
            --correct-color: #4caf50;
            --wrong-color: #f44336;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 5px solid var(--accent-color);
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #555;
            font-size: 0.9rem;
            background: #eee;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #ddd;
            color: #000;
        }

        h1 {
            font-size: 1.6rem;
            color: var(--accent-color);
            margin-top: 25px;
            margin-bottom: 5px;
        }

        .tips {
            background-color: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            text-align: left;
            margin-top: 20px;
            border-left: 4px solid var(--accent-color);
        }

        /* Thiết kế từng câu hỏi */
        .question-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .highlight {
            color: #d32f2f;
            font-family: "KaiTi", serif;
            font-size: 1.3rem;
        }

        /* Hộp dịch nghĩa 3 lớp */
        .translation-box {
            background-color: #fafafa;
            border-left: 3px solid #b0bec5;
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 0 8px 8px 0;
        }

        .han-viet {
            font-size: 0.95rem;
            color: #d32f2f; /* Màu đỏ đô cho phiên âm */
            margin-bottom: 5px;
            font-style: italic;
        }

        .word-by-word {
            font-size: 0.95rem;
            color: #1565c0; /* Màu xanh đậm cho dịch từng từ */
            margin-bottom: 5px;
            line-height: 1.8;
        }

        .full-trans {
            font-size: 0.95rem;
            color: #424242; /* Màu xám đậm cho nghĩa cả câu */
        }

        .translation-box strong {
            color: #555;
            font-style: normal;
        }

        /* Phần nút bấm đáp án */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e3f2fd;
            border-color: var(--accent-color);
        }

        .option-btn.correct {
            background-color: #e8f5e9;
            border-color: var(--correct-color);
            color: #2e7d32;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #ffebee;
            border-color: var(--wrong-color);
            color: #c62828;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .feedback {
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: bold;
            display: none;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .back-btn { top: 10px; left: 10px; padding: 5px 10px;}
            h1 { font-size: 1.3rem; margin-top: 35px;}
        }
    </style>
</head>

    const container = document.getElementById('quizContainer');

    // Hàm tạo giao diện trắc nghiệm
    function renderQuiz() {
        quizData.forEach((item) => {
            let card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${item.id}`;

            let html = `
                <div class="question-text">${item.id}/ ${item.q}</div>
                <div class="translation-box">
                    <div class="han-viet"><strong>Âm Hán Việt:</strong> ${item.hanviet}</div>
                    <div class="word-by-word"><strong>Dịch từng từ:</strong> ${item.word}</div>
                    <div class="full-trans"><strong>Nghĩa cả câu:</strong> ${item.full}</div>
                </div>
                <div class="options-grid">
                    <button class="option-btn" onclick="checkAnswer(${item.id}, 'a')">A. ${item.opts.a}</button>
                    <button class="option-btn" onclick="checkAnswer(${item.id}, 'b')">B. ${item.opts.b}</button>
                    <button class="option-btn" onclick="checkAnswer(${item.id}, 'c')">C. ${item.opts.c}</button>
                    <button class="option-btn" onclick="checkAnswer(${item.id}, 'd')">D. ${item.opts.d}</button>
                </div>
                <div class="feedback" id="feedback-${item.id}"></div>
            `;
            card.innerHTML = html;
            container.appendChild(card);
        });
    }

    // Hàm kiểm tra đúng/sai khi click
    function checkAnswer(questionId, selectedOpt) {
        let question = quizData.find(q => q.id === questionId);
        let correctOpt = question.ans;
        
        let card = document.getElementById(`q-card-${questionId}`);
        let buttons = card.querySelectorAll('.option-btn');
        let feedback = document.getElementById(`feedback-${questionId}`);

        buttons.forEach(btn => btn.disabled = true);

        let btnA = buttons[0]; let btnB = buttons[1]; let btnC = buttons[2]; let btnD = buttons[3];
        
        let selectedBtn = 
            selectedOpt === 'a' ? btnA :
            selectedOpt === 'b' ? btnB :
            selectedOpt === 'c' ? btnC : btnD;

        let correctBtn = 
            correctOpt === 'a' ? btnA :
            correctOpt === 'b' ? btnB :
            correctOpt === 'c' ? btnC : btnD;

        if (selectedOpt === correctOpt) {
            selectedBtn.classList.add('correct');
            feedback.innerHTML = "✅ Chính xác!";
            feedback.style.color = "var(--correct-color)";
        } else {
            selectedBtn.classList.add('wrong');
            correctBtn.classList.add('correct');
            feedback.innerHTML = `❌ Sai rồi! Đáp án đúng là <b>${correctOpt.toUpperCase()}</b>.`;
            feedback.style.color = "var(--wrong-color)";
        }

        feedback.style.display = "block";
    }

    renderQuiz();
</script>
